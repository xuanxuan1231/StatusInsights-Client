name: Build All Platforms (Win/Android/Linux)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run tests
        run: flutter test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate l10n
        run: flutter gen-l10n

      - name: Validate Android signing secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || \
             [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || \
             [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] || \
             [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "Missing Android signing secrets."
            exit 1
          fi

      - name: Prepare Android signing files
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my-release-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=my-release-keystore.jks
          EOF
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build AAB
        run: flutter build appbundle --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            dpkg-dev \
            libblkid-dev \
            liblzma-dev \
            libssl-dev \
            libayatana-appindicator3-dev
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate l10n
        run: flutter gen-l10n
      
      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux .deb
        run: |
          cd build/linux/x64/release
          cmake -DSTATUSINSIGHTS_DEB_PACKAGE=ON .
          cpack -G DEB
      
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ github.run_number }}
          path: build/linux/x64/release/bundle/

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ github.run_number }}
          path: build/linux/x64/release/*.deb

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate l10n
        run: flutter gen-l10n
      
      - name: Build Windows
        run: flutter build windows --release
      
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_number }}
          path: build/windows/x64/runner/Release/
